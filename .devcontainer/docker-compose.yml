volumes:
  postgres-data:
    name: horext-postgres-data

services:
  app:
    image: mcr.microsoft.com/devcontainers/java:3.0.0-25-bookworm
    environment:
      # NOTE: SPRING_DATASOURCE_USERNAME/PASSWORD/URL should match values in db container
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: postgres
        SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/horext
        SPRING_DATASOURCE_SCHEMA: public
        FLYWAY_PLACEHOLDERS_SEED_DATA: true

    volumes:
      - ../..:/workspaces:cached
      
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Use proper Docker networking instead of network_mode: service:db
    # to ensure reliable DNS resolution in all environments
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally. 
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  db:
    image: postgres:17
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      # NOTE: POSTGRES_DB/USER/PASSWORD should match values in app container
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: horext
      POSTGRES_ROOT_PASSWORD: postgres

    # Add "forwardPorts": ["5432"] to **devcontainer.json** to forward PostgreSQL locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

networks:
  app-network:
    driver: bridge