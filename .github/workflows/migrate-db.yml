name: Migrate Database

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: "25"
        description: "Java version to use for migration"
    secrets:
      SPRING_DATASOURCE_USERNAME:
        required: true
      SPRING_DATASOURCE_PASSWORD:
        required: true
      SPRING_DATASOURCE_URL:
        required: true
      SPRING_DATASOURCE_SCHEMA:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to migrate"
        type: environment
        required: true
      java-version:
        description: "Java version to use for migration"
        type: string
        required: false
        default: "25"

permissions:
  contents: read

jobs:
  migrate:
    name: Run Database Migration
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ inputs.java-version }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradlew executable
        run: chmod +x gradlew

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: app-data

      - name: Clone app-data repository
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh repo clone ${{ github.repository_owner }}/app-data app-data -- --depth 1

      - name: Sync CSV data files
        run: |
          rsync -av --include='*.csv' --exclude='*' app-data/seeds/ src/main/resources/db/data/
          echo "CSV files synced from admin-data repository"

      - name: Build with Gradle
        run: ./gradlew assemble

      - name: Migrate Database
        run: ./gradlew flywayMigrate -i
        env:
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_SCHEMA: ${{ secrets.SPRING_DATASOURCE_SCHEMA }}

