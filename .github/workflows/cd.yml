name: CD Pipeline

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: "25"
      skip-seeds:
        required: false
        type: boolean
        default: false
    secrets:
      SERVER_USER:
        required: true
      SERVER_IP:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      ENV_FILE:
        required: true
      DOCKER_PROJECT_NAME:
        required: true
      ENV_FILE_PATH:
        required: true
      SPRING_DATASOURCE_USERNAME:
        required: true
      SPRING_DATASOURCE_PASSWORD:
        required: true
      SPRING_DATASOURCE_URL:
        required: true
      SPRING_DATASOURCE_SCHEMA:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        type: environment
        required: true
      java-version:
        description: "Java version to use in release and migration"
        type: string
        required: false
        default: "25"
      skip-seeds:
        description: "Whether to skip seed migrations"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      java-version: ${{ inputs.java-version }}
    permissions:
      contents: read
      packages: write

  migrate-db:
    needs: release
    uses: ./.github/workflows/migrate-db.yml
    with:
      environment: ${{ inputs.environment }}
      java-version: ${{ inputs.java-version }}
      skip-seeds: ${{ inputs.skip-seeds }}
    secrets: inherit

  deploy:
    needs: [release, migrate-db]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ inputs.environment }}
      image-tag: ${{ needs.release.outputs.image-tag }}
    secrets: inherit
