name: Release Workflow

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: "25"
    outputs:
      image-tag:
        description: "Docker image tag"
        value: ${{ jobs.release.outputs.tags }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/${{ github.ref_name }}

jobs:
  release:
    name: Build and Push OCI Image
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up GraalVM ${{ inputs.java-version }}
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: ${{ inputs.java-version }}
          cache: gradle
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: false

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      - name: Make Gradlew executable
        run: chmod +x gradlew

      - name: Resolve image tag
        id: image
        run: echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull previous image for buildpack cache warmup
        run: docker pull ${{ steps.image.outputs.tag }} || true

      - name: Build OCI image with Spring Boot
        run: ./gradlew bootBuildImage --imageName=${{ steps.image.outputs.tag }} --no-daemon

      - name: Push OCI image
        run: docker push ${{ steps.image.outputs.tag }}
